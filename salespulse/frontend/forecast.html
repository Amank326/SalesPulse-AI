<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Forecast — SalesPulse AI</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>body{font-family:Inter,Arial;background:#f5f7fb;padding:24px}</style>
</head>
<body>
  <h1>Forecast Results</h1>
  <div id="summary">
    <p id="info">Loading forecast...</p>
    <img id="forecastPlot" src="" alt="forecast plot" style="max-width:640px;display:none"/>
  </div>
  <script>
    async function loadForecast(){
      const token = localStorage.getItem('token');
      const headers = {};
      if(token) headers['Authorization'] = `Bearer ${token}`;
      try{
        const resp = await fetch('http://127.0.0.1:8000/api/forecast', {method:'POST', headers});
        if(!resp.ok){
          const err = await resp.json().catch(()=>null);
          document.getElementById('info').textContent = 'Forecast failed: ' + (err?.detail || resp.status);
          return;
        }
        const data = await resp.json();
        document.getElementById('info').textContent = `Forecast for ${data.target_col}: ${data.predictions.join(', ')}`;
        if(data.plot){
          const img = document.getElementById('forecastPlot');
          img.src = data.plot;
          img.style.display = 'block';
        }
      }catch(e){
        document.getElementById('info').textContent = 'Unable to reach backend: ' + e.message;
      }
    }
    loadForecast();
  </script>
</body>
</html>
